name: Acceptance

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  action-end-to-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The action imports the target parser by module path, so the fixture
      # package must be importable. Job-level env is inherited by the
      # composite action's steps.
      - name: Expose fixtures on PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/tests" >> "$GITHUB_ENV"

      - name: Run the action (no PR opened)
        uses: ./
        with:
          parser-location: sample_parsers:simple
          output-path: descriptors/simple.json
          open-pr: false
          token: ${{ github.token }}

      - name: Descriptor was created and is valid JSON
        run: |
          test -f descriptors/simple.json
          python -c "import json; json.load(open('descriptors/simple.json'))"

      - name: Validate as Boutiques (after normalization)
        run: |
          pip install boutiques
          python - <<'PY'
          import json
          path = "descriptors/simple.json"
          d = json.load(open(path))
          # Post-processing the styx output to vanilla Boutiques. If the
          # action gains a normalization step, drop this block.
          d["schema-version"] = "0.5"
          d.setdefault("description", "Generated by argparse-to-boutiques.")
          d.setdefault("tool-version", "0.0.0")
          json.dump(d, open(path, "w"))
          PY
          bosh validate descriptors/simple.json

  pipeline-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
      - name: Install tools
        run: |
          pip install pytest argdump boutiques
          npm install --no-save @styx-api/cli @styx-api/core
      - name: Run acceptance tests
        env:
          STYX: ./node_modules/.bin/styx
          BOSH: bosh
          RUN_ARGDUMP: ./scripts/run_argdump.py
        run: pytest tests/test_acceptance.py -v
